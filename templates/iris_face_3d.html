<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS 3D — Mixamo Model</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/inflate.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .status-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #8a9bb8;
            font-size: 16px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            transition: color 0.5s;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4a90d9;
            font-size: 20px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(74, 144, 217, 0.2);
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            max-width: 300px;
            text-align: center;
        }
    </style>
<base target="_blank">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon-96x96.png') }}" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}">
    <meta name="apple-mobile-web-app-title" content="IRIS">
    <meta name="theme-color" content="#0a0a0f">
    </head>
<body>
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <span>Loading IRIS 3D...</span>
        <span id="load-percent">0%</span>
    </div>
    <div id="canvas-container"></div>
    <div class="status-text" id="status-text">IRIS 3D</div>

    <script>
        // ─── Three.js Setup ───
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x0a0a0f, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.5;
        controls.maxDistance = 8;
        controls.target.set(0, 1, 0);
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // ─── Lighting System ───
        const ambientLight = new THREE.AmbientLight(0x1a1a3e, 0.4);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0x4a90d9, 1.2);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.set(2048, 2048);
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.bias = -0.001;
        scene.add(mainLight);

        const rimLight = new THREE.SpotLight(0xb86af0, 0.8);
        rimLight.position.set(-4, 4, -3);
        rimLight.lookAt(0, 1, 0);
        scene.add(rimLight);

        const fillLight = new THREE.PointLight(0x2ecc71, 0.3, 10);
        fillLight.position.set(-2, 2, 2);
        scene.add(fillLight);

        const bottomLight = new THREE.PointLight(0x4a90d9, 0.2, 8);
        bottomLight.position.set(0, 0.2, 2);
        scene.add(bottomLight);

        // ─── Ground Reflection ───
        const groundGeo = new THREE.CircleGeometry(4, 64);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a0f,
            roughness: 0.1,
            metalness: 0.8,
            envMapIntensity: 0.5
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid helper (subtle)
        const grid = new THREE.GridHelper(10, 20, 0x1a1a3e, 0x0f0f1a);
        grid.position.y = 0.01;
        scene.add(grid);

        // ─── Load IRIS.fbx ───
        let irisModel = null;
        let mixer = null;
        let animations = [];
        let currentAction = null;
        const clock = new THREE.Clock();

        const loader = new THREE.FBXLoader();

        // Try multiple paths for flexibility
        const possiblePaths = [
            '/static/3d/IRIS.fbx',
            '/3d/IRIS.fbx',
            'IRIS.fbx',
            '../static/3d/IRIS.fbx'
        ];

        function tryLoadFBX(index = 0) {
            if (index >= possiblePaths.length) {
                showError('Could not find IRIS.fbx. Please ensure it is placed in static/3d/');
                return;
            }

            loader.load(possiblePaths[index],
                (fbx) => {
                    onModelLoaded(fbx);
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        document.getElementById('load-percent').textContent = percent + '%';
                    }
                },
                (error) => {
                    console.warn(`Failed to load from ${possiblePaths[index]}:`, error);
                    tryLoadFBX(index + 1);
                }
            );
        }

        function onModelLoaded(fbx) {
            document.getElementById('loading').style.display = 'none';

            irisModel = fbx;

            // Auto-scale to fit viewport
            const box = new THREE.Box3().setFromObject(irisModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetHeight = 1.7; // Human height in meters
            const scale = targetHeight / maxDim;
            irisModel.scale.set(scale, scale, scale);

            // Center model
            const center = box.getCenter(new THREE.Vector3());
            irisModel.position.x = -center.x * scale;
            irisModel.position.z = -center.z * scale;
            irisModel.position.y = 0;

            // Enable shadows on all meshes
            irisModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Improve material
                    if (child.material) {
                        child.material.roughness = 0.6;
                        child.material.metalness = 0.1;
                    }
                }
            });

            scene.add(irisModel);

            // Setup animation mixer
            if (fbx.animations && fbx.animations.length > 0) {
                mixer = new THREE.AnimationMixer(irisModel);

                fbx.animations.forEach((clip, index) => {
                    const action = mixer.clipAction(clip);
                    animations.push({
                        name: clip.name || `anim_${index}`,
                        action: action,
                        clip: clip
                    });
                });

                // Play idle animation (first one or one containing "idle")
                const idleAnim = animations.find(a => 
                    a.name.toLowerCase().includes('idle')
                ) || animations[0];

                if (idleAnim) {
                    idleAnim.action.play();
                    currentAction = idleAnim.action;
                }

                console.log('Available animations:', animations.map(a => a.name));
            } else {
                console.log('No animations found in model');
            }

            // Adjust camera to frame model
            controls.target.set(0, targetHeight * 0.5, 0);
            camera.position.set(0, targetHeight * 0.8, 3);

            // Start render loop
            animate();
        }

        function showError(msg) {
            document.getElementById('loading').innerHTML = `
                <div class="error-msg">⚠️ ${msg}</div>
                <div style="margin-top:10px;font-size:12px;color:#666;">
                    Falling back to 2D face...
                </div>
            `;
            setTimeout(() => {
                window.parent.postMessage({ type: 'load_error', value: msg }, '*');
            }, 2000);
        }

        // ─── Animation System ───
        function crossFadeTo(animName, duration = 0.5) {
            if (!mixer || animations.length === 0) return;

            const target = animations.find(a => 
                a.name.toLowerCase().includes(animName.toLowerCase())
            );
            if (!target || target.action === currentAction) return;

            if (currentAction) {
                currentAction.fadeOut(duration);
            }

            target.action.reset().fadeIn(duration).play();
            currentAction = target.action;
        }

        function setSpeaking(speaking) {
            if (!mixer) return;

            if (speaking) {
                // Try talking animation, fallback to idle with faster speed
                const talkAnim = animations.find(a => 
                    a.name.toLowerCase().includes('talk') ||
                    a.name.toLowerCase().includes('speak')
                );
                if (talkAnim) {
                    crossFadeTo('talk', 0.3);
                } else if (currentAction) {
                    currentAction.timeScale = 2; // Speed up idle
                }
            } else {
                crossFadeTo('idle', 0.5);
                if (currentAction) currentAction.timeScale = 1;
            }
        }

        // ─── Mood Lighting ───
        const moodPresets = {
            neutral: { main: 0x4a90d9, rim: 0xb86af0, fill: 0x2ecc71, bottom: 0x4a90d9 },
            happy: { main: 0x4ad990, rim: 0xf0c040, fill: 0x2ecc71, bottom: 0x4ad990 },
            sad: { main: 0x4a6fa8, rim: 0x6a4fa0, fill: 0x1a3a5c, bottom: 0x2a4a6c },
            thinking: { main: 0xb86af0, rim: 0x4a90d9, fill: 0x9b59b6, bottom: 0x7b4fb0 },
            angry: { main: 0xd84848, rim: 0xa03030, fill: 0x5a1a1a, bottom: 0x903030 },
            speaking: { main: 0x5ba3e8, rim: 0x4a90d9, fill: 0x2ecc71, bottom: 0x4a90d9 },
            listening: { main: 0x4ad990, rim: 0x2ecc71, fill: 0x4a90d9, bottom: 0x4ad990 }
        };

        function setMood(mood) {
            const p = moodPresets[mood] || moodPresets.neutral;

            // Smooth color transitions
            const duration = 500; // ms
            const startTime = Date.now();
            const startColors = {
                main: mainLight.color.clone(),
                rim: rimLight.color.clone(),
                fill: fillLight.color.clone(),
                bottom: bottomLight.color.clone()
            };
            const targetColors = {
                main: new THREE.Color(p.main),
                rim: new THREE.Color(p.rim),
                fill: new THREE.Color(p.fill),
                bottom: new THREE.Color(p.bottom)
            };

            function updateColors() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);

                mainLight.color.lerpColors(startColors.main, targetColors.main, t);
                rimLight.color.lerpColors(startColors.rim, targetColors.rim, t);
                fillLight.color.lerpColors(startColors.fill, targetColors.fill, t);
                bottomLight.color.lerpColors(startColors.bottom, targetColors.bottom, t);

                if (t < 1) requestAnimationFrame(updateColors);
            }
            updateColors();
        }

        // ─── Head Tracking ───
        let mouseX = 0, mouseY = 0;
        let targetHeadRot = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            targetHeadRot.y = mouseX * 0.4;
            targetHeadRot.x = mouseY * 0.2;
        });

        function updateHeadTracking() {
            if (!irisModel) return;

            // Smoothly interpolate rotation
            irisModel.rotation.y += (targetHeadRot.y - irisModel.rotation.y) * 0.05;
            irisModel.rotation.x += (targetHeadRot.x - irisModel.rotation.x) * 0.05;
        }

        // ─── PostMessage API ───
        window.addEventListener('message', (e) => {
            const { type, value } = e.data;

            switch(type) {
                case 'expression':
                    setMood(value);
                    // Try to find matching animation
                    const exprMap = {
                        happy: 'happy', sad: 'sad', 
                        thinking: 'think', angry: 'angry',
                        surprised: 'surprise'
                    };
                    if (exprMap[value]) crossFadeTo(exprMap[value], 0.5);
                    break;

                case 'speaking':
                    setSpeaking(value);
                    setMood(value ? 'speaking' : 'neutral');
                    break;

                case 'listening':
                    setMood(value ? 'listening' : 'neutral');
                    break;

                case 'status':
                    document.getElementById('status-text').textContent = value;
                    break;

                case 'playAnim':
                    crossFadeTo(value, 0.3);
                    break;
            }
        });

        // ─── Render Loop ───
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            updateHeadTracking();
            controls.update();
            renderer.render(scene, camera);
        }

        // ─── Resize Handler ───
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── Start Loading ───
        tryLoadFBX();
    </script>
</body>
</html>
