<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS Face</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .face-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        .iris-face {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #5ba3e8, #2a6fa8, #1a3a5c);
            position: relative;
            box-shadow:
                0 0 60px rgba(74, 144, 217, 0.3),
                0 0 120px rgba(74, 144, 217, 0.1),
                inset -20px -20px 60px rgba(0,0,0,0.3),
                inset 20px 20px 40px rgba(255,255,255,0.05);
            animation: face-breathe 4s ease-in-out infinite;
            transition: all 0.5s ease;
        }
        @keyframes face-breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(74, 144, 217, 0.3); }
            50% { transform: scale(1.02); box-shadow: 0 0 80px rgba(74, 144, 217, 0.5); }
        }

        /* Eyes */
        .eye {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #ffffff, #c8e6f5);
            position: absolute;
            top: 80px;
            box-shadow: 0 0 30px rgba(255,255,255,0.15), inset 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .eye.left { left: 55px; }
        .eye.right { right: 55px; }

        .pupil {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a0f);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .pupil::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            position: absolute;
            top: 20%;
            left: 25%;
        }

        /* Eyelids for blinking and expressions */
        .eyelid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to bottom, #2a6fa8, #1a3a5c);
            border-radius: 50% 50% 0 0;
            transition: height 0.15s ease;
            z-index: 2;
        }
        .eyelid.lower {
            top: auto;
            bottom: 0;
            border-radius: 0 0 50% 50%;
            background: linear-gradient(to top, #2a6fa8, #1a3a5c);
        }

        /* Eyebrows */
        .eyebrow {
            width: 70px;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            position: absolute;
            top: 60px;
            transition: all 0.3s ease;
        }
        .eyebrow.left { left: 50px; transform-origin: right center; }
        .eyebrow.right { right: 50px; transform-origin: left center; }

        /* Mouth */
        .mouth-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mouth {
            width: 70px;
            height: 8px;
            border-radius: 0 0 35px 35px;
            background: linear-gradient(to bottom, #1a1a2e, #0a0a0f);
            position: relative;
            transition: all 0.15s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .mouth::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 20%;
            width: 60%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            border-radius: 2px;
        }

        /* Teeth (visible when mouth opens) */
        .teeth {
            position: absolute;
            top: 2px;
            left: 15%;
            width: 70%;
            height: 0px;
            background: linear-gradient(to bottom, #e8e8e8, #c0c0c0);
            border-radius: 0 0 3px 3px;
            transition: height 0.1s ease;
            overflow: hidden;
        }

        /* Cheeks */
        .cheek {
            width: 40px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,150,150,0.15), transparent);
            position: absolute;
            top: 130px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .cheek.left { left: 30px; }
        .cheek.right { right: 30px; }

        /* Expression states */
        .iris-face.happy {
            background: radial-gradient(circle at 35% 30%, #6bb8f0, #3a8fd0, #1a4a6c);
        }
        .iris-face.happy .mouth {
            height: 25px;
            border-radius: 0 0 40px 40px;
            width: 60px;
        }
        .iris-face.happy .cheek { opacity: 1; }
        .iris-face.happy .eyebrow { transform: translateY(-5px); }

        .iris-face.sad {
            background: radial-gradient(circle at 35% 30%, #4a8ab8, #2a5a88, #1a3a4c);
        }
        .iris-face.sad .mouth {
            height: 10px;
            border-radius: 35px 35px 0 0;
            width: 50px;
        }
        .iris-face.sad .eyebrow.left { transform: rotate(-15deg) translateY(3px); }
        .iris-face.sad .eyebrow.right { transform: rotate(15deg) translateY(3px); }

        .iris-face.surprised .mouth {
            width: 35px;
            height: 30px;
            border-radius: 50%;
        }
        .iris-face.surprised .eyebrow { transform: translateY(-8px); }
        .iris-face.surprised .pupil { transform: translate(-50%, -50%) scale(0.8); }

        .iris-face.thinking .eyebrow.left { transform: rotate(-10deg); }
        .iris-face.thinking .eyebrow.right { transform: rotate(5deg) translateY(-3px); }
        .iris-face.thinking .mouth { width: 40px; height: 5px; border-radius: 3px; }

        .iris-face.angry {
            background: radial-gradient(circle at 35% 30%, #d84848, #a03030, #5a1a1a);
            box-shadow: 0 0 60px rgba(216, 72, 72, 0.3);
        }
        .iris-face.angry .eyebrow.left { transform: rotate(20deg) translateY(5px); }
        .iris-face.angry .eyebrow.right { transform: rotate(-20deg) translateY(5px); }
        .iris-face.angry .mouth { width: 55px; height: 6px; border-radius: 3px; }

        /* Speaking animation */
        .iris-face.speaking .mouth {
            animation: mouth-speak 0.15s ease-in-out infinite alternate;
        }
        @keyframes mouth-speak {
            from { height: 6px; width: 55px; }
            to { height: 22px; width: 45px; }
        }

        /* Blinking */
        .iris-face.blinking .eyelid { height: 100%; }
        .iris-face.blinking .eyelid.lower { height: 100%; }

        /* Listening state */
        .iris-face.listening {
            box-shadow: 0 0 80px rgba(74, 217, 144, 0.4);
            animation: listening-pulse 1.5s ease-in-out infinite;
        }
        @keyframes listening-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* Status text */
        .status-text {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #8a9bb8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px;
            white-space: nowrap;
            opacity: 0.8;
        }
    </style>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon-96x96.png') }}" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}">
    <meta name="apple-mobile-web-app-title" content="IRIS">
    <meta name="theme-color" content="#0a0a0f">
    </head>
<body>
    <div class="face-container">
        <div class="iris-face" id="iris-face">
            <div class="eyebrow left" id="eyebrow-left"></div>
            <div class="eyebrow right" id="eyebrow-right"></div>
            <div class="eye left" id="eye-left">
                <div class="eyelid" id="eyelid-left"></div>
                <div class="pupil" id="pupil-left"></div>
            </div>
            <div class="eye right" id="eye-right">
                <div class="eyelid" id="eyelid-right"></div>
                <div class="pupil" id="pupil-right"></div>
            </div>
            <div class="cheek left"></div>
            <div class="cheek right"></div>
            <div class="mouth-container">
                <div class="mouth" id="mouth">
                    <div class="teeth" id="teeth"></div>
                </div>
            </div>
        </div>
        <div class="status-text" id="status-text">IRIS</div>
    </div>

    <script>
        const face = document.getElementById('iris-face');
        const pupils = [document.getElementById('pupil-left'), document.getElementById('pupil-right')];
        const eyebrows = [document.getElementById('eyebrow-left'), document.getElementById('eyebrow-right')];
        const mouth = document.getElementById('mouth');
        const statusText = document.getElementById('status-text');

        // Track mouse for eye movement
        document.addEventListener('mousemove', (e) => {
            const rect = face.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const distance = Math.min(8, Math.hypot(e.clientX - centerX, e.clientY - centerY) / 20);

            pupils.forEach(pupil => {
                pupil.style.transform = `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px))`;
            });
        });

        // Auto blink
        function blink() {
            face.classList.add('blinking');
            setTimeout(() => face.classList.remove('blinking'), 150);
            setTimeout(blink, 3000 + Math.random() * 4000);
        }
        setTimeout(blink, 2000);

        // Expression API
        window.IRISFace = {
            setExpression: (expression) => {
                face.className = 'iris-face';
                if (expression) face.classList.add(expression);
            },
            setSpeaking: (speaking) => {
                face.classList.toggle('speaking', speaking);
            },
            setListening: (listening) => {
                face.classList.toggle('listening', listening);
            },
            setStatus: (text) => {
                statusText.textContent = text;
            },
            lookAt: (x, y) => {
                const rect = face.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const angle = Math.atan2(y - centerY, x - centerX);
                const distance = Math.min(8, Math.hypot(x - centerX, y - centerY) / 20);
                pupils.forEach(pupil => {
                    pupil.style.transform = `translate(calc(-50% + ${Math.cos(angle) * distance}px), calc(-50% + ${Math.sin(angle) * distance}px))`;
                });
            }
        };

        // Listen for parent messages
        window.addEventListener('message', (e) => {
            if (e.data.type === 'expression') {
                window.IRISFace.setExpression(e.data.value);
            } else if (e.data.type === 'speaking') {
                window.IRISFace.setSpeaking(e.data.value);
            } else if (e.data.type === 'listening') {
                window.IRISFace.setListening(e.data.value);
            } else if (e.data.type === 'status') {
                window.IRISFace.setStatus(e.data.value);
            }
        });
    </script>
</body>
</html>
