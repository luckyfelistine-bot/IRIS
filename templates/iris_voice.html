<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIS Voice — Hey IRIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .voice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 30px;
            width: 100%;
            max-width: 700px;
        }
        .face-wrapper {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(74, 144, 217, 0.2);
            box-shadow: 0 0 60px rgba(74, 144, 217, 0.15);
            background: #0a0a0f;
            position: relative;
            transition: all 0.5s ease;
        }
        .face-wrapper.has-3d {
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            height: 400px;
        }
        .face-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .face-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(74, 144, 217, 0.3);
            background: rgba(10, 10, 15, 0.8);
            color: #8a9bb8;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .face-wrapper:hover .face-toggle {
            opacity: 1;
        }
        .face-toggle:hover {
            background: rgba(74, 144, 217, 0.2);
            color: #e0e0ff;
        }
        .status-text {
            font-size: 20px;
            font-weight: 300;
            text-align: center;
            min-height: 32px;
            color: #8a9bb8;
            transition: color 0.3s;
        }
        .status-text.listening { color: #4ad990; }
        .status-text.thinking { color: #b86af0; }
        .status-text.speaking { color: #4a90d9; }
        .status-text.wake { color: #f0c040; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .waveform {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 45px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .waveform.active { opacity: 1; }
        .wave-bar {
            width: 4px;
            background: linear-gradient(to top, #4a90d9, #b86af0);
            border-radius: 3px;
            animation: wave 0.8s ease-in-out infinite;
        }
        .wave-bar:nth-child(1) { height: 18px; animation-delay: 0s; }
        .wave-bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { height: 25px; animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { height: 40px; animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { height: 22px; animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { height: 32px; animation-delay: 0.5s; }
        .wave-bar:nth-child(7) { height: 18px; animation-delay: 0.6s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.6); }
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-btn {
            padding: 12px 22px;
            border-radius: 10px;
            border: 1px solid rgba(74, 144, 217, 0.3);
            background: rgba(74, 144, 217, 0.08);
            color: #e0e0ff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .control-btn:hover {
            background: rgba(74, 144, 217, 0.15);
            border-color: #4a90d9;
            transform: translateY(-1px);
        }
        .control-btn.primary {
            background: linear-gradient(135deg, #4a90d9, #b86af0);
            border: none;
            font-weight: 600;
        }
        .control-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.4);
        }
        .control-btn.recording {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: record-pulse 1s ease-in-out infinite;
        }
        @keyframes record-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
        }
        .text-input-area {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 10px;
            animation: slideUp 0.3s ease;
        }
        .text-input-area.active { display: flex; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .text-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 15px;
            outline: none;
        }
        .text-input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
        }
        .response-area {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(74, 144, 217, 0.15);
            border-radius: 14px;
            display: none;
            font-size: 15px;
            line-height: 1.6;
            max-height: 180px;
            overflow-y: auto;
        }
        .response-area.active { display: block; }
        .response-area::-webkit-scrollbar { width: 5px; }
        .response-area::-webkit-scrollbar-thumb {
            background: rgba(74, 144, 217, 0.3);
            border-radius: 3px;
        }
        .wake-indicator {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(74, 144, 217, 0.1);
            border: 1px solid rgba(74, 144, 217, 0.2);
            font-size: 12px;
            color: #8a9bb8;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }
        .wake-indicator.active {
            background: rgba(74, 217, 144, 0.15);
            border-color: rgba(74, 217, 144, 0.3);
            color: #4ad990;
        }
        .wake-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;            background: #555;
            transition: background 0.3s;
        }
        .wake-indicator.active .wake-dot {
            background: #4ad990;
            animation: dot-pulse 1.5s ease-in-out infinite;
        }
        @keyframes dot-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .model-badge {
            position: fixed;
            top: 16px;
            left: 16px;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(74, 144, 217, 0.1);
            border: 1px solid rgba(74, 144, 217, 0.2);
            font-size: 11px;
            color: #6a7bb8;
            z-index: 100;
        }
    </style>D
<base target="_blank">
</head>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon-96x96.png') }}" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='icons/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}">
    <meta name="apple-mobile-web-app-title" content="IRIS">
    <meta name="theme-color" content="#0a0a0f">
    </head>
<body>
    <div class="model-badge" id="model-badge">Loading face...</div>
    <div class="wake-indicator" id="wake-indicator">
        <div class="wake-dot"></div>
        <span id="wake-text">Wake word: OFF</span>
    </div>
    <div class="voice-container">
        <div class="face-wrapper" id="face-wrapper">
            <button class="face-toggle" id="face-toggle" title="Toggle 2D/3D">🎭 2D</button>
            <iframe src="/face" id="face-frame" title="IRIS Face"></iframe>
        </div>
        <div class="status-text" id="status-text">Say "Hey IRIS" to activate</div>
        <div class="waveform" id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="controls">
            <button class="control-btn primary" id="mic-btn">🎤 Hold to Speak</button>
            <button class="control-btn" id="keyboard-btn">⌨️ Keyboard</button>
            <button class="control-btn" id="camera-btn">📷 Camera</button>
            <button class="control-btn" id="wake-toggle-btn">👂 Wake Word</button>
        </div>
        <div class="text-input-area" id="text-input-area">
            <input type="text" class="text-input" id="text-input" placeholder="Type your message...">
            <button class="control-btn primary" id="send-text-btn">Send</button>
        </div>
        <div class="response-area" id="response-area"></div>
    </div>
    <script>

        const faceWrapper = document.getElementById('face-wrapper');
        const faceFrame = document.getElementById('face-frame');
        const faceToggle = document.getElementById('face-toggle');
        const modelBadge = document.getElementById('model-badge');
        const statusText = document.getElementById('status-text');
        const waveform = document.getElementById('waveform');
        const micBtn = document.getElementById('mic-btn');
        const keyboardBtn = document.getElementById('keyboard-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const wakeToggleBtn = document.getElementById('wake-toggle-btn');
        const textInputArea = document.getElementById('text-input-area');
        const textInput = document.getElementById('text-input');
        const sendTextBtn = document.getElementById('send-text-btn');
        const responseArea = document.getElementById('response-area');
        const wakeIndicator = document.getElementById('wake-indicator');
        const wakeText = document.getElementById('wake-text');

        let isListening = false;
        let isSpeaking = false;
        let wakeWordEnabled = false;
        let recognition = null;
        let wakeRecognition = null;
        let silenceTimer = null;
        let is3D = false;

        function detectFaceType() {
            setTimeout(() => {
                try {
                    const frameDoc = faceFrame.contentDocument || faceFrame.contentWindow.document;
                    const title = frameDoc.title;
                    is3D = title.includes('3D');
                    if (is3D) {
                        faceWrapper.classList.add('has-3d');
                        faceToggle.textContent = '🎭 3D';
                        modelBadge.textContent = 'IRIS 3D — Mixamo Model';
                    } else {
                        modelBadge.textContent = 'IRIS 2D — CSS Face';
                    }
                } catch (e) {
                    modelBadge.textContent = 'IRIS Face';
                }
            }, 1500);
        }
        detectFaceType();

        faceToggle.addEventListener('click', () => {
            is3D = !is3D;
            faceFrame.src = is3D ? '/face/3d' : '/face/2d';
            faceToggle.textContent = is3D ? '🎭 3D' : '🎭 2D';
            faceWrapper.classList.toggle('has-3d', is3D);
            modelBadge.textContent = is3D ? 'IRIS 3D — Mixamo Model' : 'IRIS 2D — CSS Face';
        });

        function sendToFace(type, value) {
            if (faceFrame.contentWindow) {
                faceFrame.contentWindow.postMessage({ type, value }, '*');
            }
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusText.textContent = 'Speech recognition not supported';
                micBtn.disabled = true;
                return false;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                statusText.textContent = 'Listening...';
                statusText.className = 'status-text listening';
                waveform.classList.add('active');
                sendToFace('listening', true);
                sendToFace('expression', 'listening');
                micBtn.classList.add('recording');
                micBtn.textContent = '🔴 Recording...';
            };

            recognition.onresult = (event) => {
                const results = Array.from(event.results);
                const transcript = results.map(r => r[0].transcript).join('');
                const isFinal = results[results.length - 1].isFinal;
                statusText.textContent = 'You: "' + transcript + '"';
                clearTimeout(silenceTimer);
                if (isFinal) {
                    silenceTimer = setTimeout(() => {
                        stopListening();
                        processInput(transcript);
                    }, 500);
                }
            };

            recognition.onend = () => {
                if (isListening) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech error:', event.error);
                if (event.error === 'no-speech') {
                    statusText.textContent = 'No speech detected. Try again.';
                } else if (event.error === 'audio-capture') {
                    statusText.textContent = 'No microphone found.';
                } else if (event.error === 'not-allowed') {
                    statusText.textContent = 'Microphone access denied.';
                }
                stopListening();
            };

            wakeRecognition = new SpeechRecognition();
            wakeRecognition.continuous = true;
            wakeRecognition.interimResults = true;
            wakeRecognition.lang = 'en-US';

            wakeRecognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(r => r[0].transcript)
                    .join('')
                    .toLowerCase();
                if (transcript.includes('hey iris') || transcript.includes('hi iris') ||
                    transcript.includes('hey eyes') || transcript.includes('iris')) {
                    wakeRecognition.stop();
                    onWakeWordDetected();
                }
            };

            wakeRecognition.onend = () => {
                if (wakeWordEnabled) {
                    setTimeout(() => {
                        try { wakeRecognition.start(); } catch(e) {}
                    }, 300);
                }
            };

            wakeRecognition.onerror = () => {
                if (wakeWordEnabled) {
                    setTimeout(() => {
                        try { wakeRecognition.start(); } catch(e) {}
                    }, 1000);
                }
            };

            return true;
        }

        function onWakeWordDetected() {
            statusText.textContent = 'Hey sir! How can I help you?';
            statusText.className = 'status-text wake';
            sendToFace('expression', 'happy');
            sendToFace('status', 'Hey sir!');
            playChime();
            setTimeout(() => startListening(), 800);
        }

        function playChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function startListening() {
            if (!recognition) {
                if (!initSpeechRecognition()) return;
            }
            try { recognition.start(); } catch(e) {}
        }

        function stopListening() {
            isListening = false;
            clearTimeout(silenceTimer);
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            waveform.classList.remove('active');
            micBtn.classList.remove('recording');
            micBtn.textContent = '🎤 Hold to Speak';
            sendToFace('listening', false);
        }

        micBtn.addEventListener('mousedown', startListening);
        micBtn.addEventListener('mouseup', stopListening);
        micBtn.addEventListener('mouseleave', stopListening);
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopListening(); });

        wakeToggleBtn.addEventListener('click', () => {
            wakeWordEnabled = !wakeWordEnabled;
            if (wakeWordEnabled) {
                wakeIndicator.classList.add('active');
                wakeText.textContent = 'Wake word: ON';
                wakeToggleBtn.textContent = '👂 Wake: ON';
                wakeToggleBtn.style.background = 'rgba(74, 217, 144, 0.15)';
                if (!wakeRecognition) initSpeechRecognition();
                try { wakeRecognition.start(); } catch(e) {}
                statusText.textContent = 'Listening for "Hey IRIS"...';
                sendToFace('status', 'Listening...');
            } else {
                wakeIndicator.classList.remove('active');
                wakeText.textContent = 'Wake word: OFF';
                wakeToggleBtn.textContent = '👂 Wake Word';
                wakeToggleBtn.style.background = '';
                if (wakeRecognition) {
                    try { wakeRecognition.stop(); } catch(e) {}
                }
                statusText.textContent = 'Say "Hey IRIS" to activate';
                sendToFace('status', 'IRIS');
            }
        });

        keyboardBtn.addEventListener('click', () => {
            textInputArea.classList.toggle('active');
            if (textInputArea.classList.contains('active')) {
                textInput.focus();
                statusText.textContent = 'Type your message...';
            } else {
                statusText.textContent = wakeWordEnabled ? 'Listening for "Hey IRIS"...' : 'Say "Hey IRIS" to activate';
            }
        });

        sendTextBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                processInput(text);
                textInput.value = '';
            }
        });
        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendTextBtn.click();
        });

        cameraBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                statusText.textContent = '📷 Camera active — analyzing...';
                sendToFace('expression', 'thinking');
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
                    stream.getTracks().forEach(t => t.stop());
                    const response = await fetch('/api/intelligence/vision/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            image_base64: base64,
                            question: 'What do you see? Describe in detail.'
                        })
                    });
                    const data = await response.json();
                    if (data.success) {
                        responseArea.textContent = data.analysis;
                        responseArea.classList.add('active');
                        speak(data.analysis);
                    }
                }, 2000);
            } catch (e) {
                statusText.textContent = 'Camera access denied or unavailable';
            }
        });

        async function processInput(text) {
            statusText.textContent = 'IRIS is thinking...';
            statusText.className = 'status-text thinking';
            waveform.classList.add('active');
            sendToFace('expression', 'thinking');
            sendToFace('status', 'Thinking...');
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                waveform.classList.remove('active');
                if (data.success) {
                    statusText.textContent = 'IRIS';
                    statusText.className = 'status-text speaking';
                    responseArea.textContent = data.response;
                    responseArea.classList.add('active');
                    sendToFace('expression', 'happy');
                    sendToFace('status', 'IRIS');
                    speak(data.response);
                } else {
                    statusText.textContent = 'Error: ' + data.error;
                    statusText.className = 'status-text';
                    sendToFace('expression', 'sad');
                }
            } catch (e) {
                statusText.textContent = 'Connection error. Retrying...';
                statusText.className = 'status-text';
                sendToFace('expression', 'sad');
            }
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google US English'))
                || voices.find(v => v.name.includes('Samantha'))
                || voices.find(v => v.lang === 'en-US');
            if (preferredVoice) utterance.voice = preferredVoice;

            utterance.onstart = () => {
                isSpeaking = true;
                sendToFace('speaking', true);
                sendToFace('expression', 'speaking');
                statusText.textContent = 'IRIS is speaking...';
                statusText.className = 'status-text speaking';
            };
            utterance.onend = () => {
                isSpeaking = false;
                sendToFace('speaking', false);
                sendToFace('expression', 'neutral');
                statusText.textContent = wakeWordEnabled ? 'Listening for "Hey IRIS"...' : 'Say "Hey IRIS" to activate';
                statusText.className = 'status-text';
                if (wakeWordEnabled && wakeRecognition) {
                    setTimeout(() => {
                        try { wakeRecognition.start(); } catch(e) {}
                    }, 500);
                }
            };
            window.speechSynthesis.speak(utterance);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== textInput) {
                e.preventDefault();
                isListening ? stopListening() : startListening();
            }
            if (e.code === 'Escape') {
                stopListening();
                window.speechSynthesis.cancel();
                sendToFace('speaking', false);
                sendToFace('expression', 'neutral');
            }
        });

        initSpeechRecognition();
        statusText.textContent = 'Say "Hey IRIS" to activate';
        sendToFace('status', 'IRIS');

        window.speechSynthesis.getVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
